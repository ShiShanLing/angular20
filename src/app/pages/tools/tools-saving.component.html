<div class="tool-content">
  <nz-row [nzGutter]="[16, 16]">
    <nz-col [nzSpan]="24" [nzMd]="10">
      <nz-card nzTitle="计划参数">
        <form nz-form [formGroup]="form" nzLayout="vertical">
          <nz-form-item>
            <nz-form-label nzRequired>目标金额 (元)</nz-form-label>
            <nz-form-control>
              <nz-input-number formControlName="targetAmount" [nzMin]="1" [nzStep]="1000" style="width: 100%"></nz-input-number>
            </nz-form-control>
          </nz-form-item>
          
          <nz-form-item>
            <nz-form-label nzRequired>计划期限 (个月)</nz-form-label>
            <nz-form-control>
              <nz-input-number formControlName="months" [nzMin]="1" [nzStep]="1" style="width: 100%"></nz-input-number>
            </nz-form-control>
          </nz-form-item>

          <nz-form-item>
            <nz-form-label nzRequired>每月投入 (元)</nz-form-label>
            <nz-form-control>
              <nz-input-number formControlName="monthlyInvest" [nzMin]="0" [nzStep]="100" style="width: 100%"></nz-input-number>
            </nz-form-control>
          </nz-form-item>

          <nz-form-item>
            <nz-form-label nzRequired>已存金额 (元)</nz-form-label>
            <nz-form-control>
              <nz-input-number formControlName="currentSaved" [nzMin]="0" [nzStep]="100" style="width: 100%"></nz-input-number>
            </nz-form-control>
          </nz-form-item>
        </form>
      </nz-card>
    </nz-col>

    <nz-col [nzSpan]="24" [nzMd]="14">
      <nz-card nzTitle="进度与缺口" *ngIf="result">
        
        <div style="margin-bottom: 24px;">
          <h3 style="margin-bottom: 16px;">目标完成进度 (期满预测)</h3>
          <nz-progress [nzPercent]="result.progress" [nzStrokeWidth]="16" [nzStatus]="result.gap <= 0 ? 'success' : 'active'"></nz-progress>
        </div>

        <nz-row [nzGutter]="[16, 16]" style="margin-bottom: 24px;">
          <nz-col [nzSpan]="8">
            <nz-statistic nzTitle="期满预期资金" [nzValue]="(result.finalAmount | number:'1.2-2')!"></nz-statistic>
          </nz-col>
          <nz-col [nzSpan]="8">
            <nz-statistic nzTitle="目标金额" [nzValue]="(result.target | number:'1.2-2')!"></nz-statistic>
          </nz-col>
          <nz-col [nzSpan]="8">
            <nz-statistic nzTitle="期满资金缺口" [nzValue]="((result.gap > 0 ? result.gap : 0) | number:'1.2-2')!" [nzValueStyle]="{ color: result.gap > 0 ? '#ff4d4f' : '#3f8600' }"></nz-statistic>
          </nz-col>
        </nz-row>

        <div *ngIf="result.gap > 0">
          <nz-alert nzType="warning" nzMessage="资金缺口提示"
            [nzDescription]="'按当前计划，期满时仍缺口 ¥' + (result.gap | number:'1.2-2') + '。建议每月多投入 ¥' + (result.extraMonthly | number:'1.2-2') + '。'"
            nzShowIcon>
          </nz-alert>
        </div>

        <div *ngIf="result.gap <= 0">
          <nz-alert nzType="success" nzMessage="目标达成提示"
            [nzDescription]="'恭喜！按当前计划可顺利达成目标。预计在第 ' + result.finishMonths + ' 个月提前完成。'"
            nzShowIcon>
          </nz-alert>
        </div>

      </nz-card>
    </nz-col>
  </nz-row>
</div>
