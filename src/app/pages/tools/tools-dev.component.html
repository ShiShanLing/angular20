<div class="tool-content">
  <nz-card nzTitle="开发小工具" [nzBodyStyle]="{ padding: '0px' }">
    <nz-tabs nzSize="large" [nzTabPosition]="'top'" style="padding: 16px;">
      
      <!-- Timestamp Tab -->
      <nz-tab nzTitle="时间戳转换">
        <div style="margin-bottom: 24px;">
          <h3 style="display: inline-block; margin-right: 16px;">当前时间戳</h3>
          <span style="font-size: 20px; font-weight: bold; color: var(--accent-color);">{{ currentTimestamp }}</span>
          <span style="font-size: 20px; font-weight: bold; color: var(--accent-color); margin-left:16px;">{{ currentTimestamp | date:'yyyy-MM-dd HH:mm:ss' }}</span>
        </div>

        <nz-row [nzGutter]="16" style="margin-bottom: 16px;">
          <nz-col [nzSpan]="10">
            <nz-input-wrapper nzAddonBefore="时间戳">
              <input type="text" nz-input [(ngModel)]="inputTimestamp" placeholder="支持秒或毫秒" />
            </nz-input-wrapper>
          </nz-col>
          <nz-col [nzSpan]="4" style="text-align: center;">
            <button nz-button nzType="primary" (click)="convertTsToTime()">转换 <nz-icon nzType="arrow-right" /></button>
          </nz-col>
          <nz-col [nzSpan]="8">
            <input nz-input [ngModel]="outputTime" readonly placeholder="时间结果" />
          </nz-col>
          <nz-col [nzSpan]="2">
            <button nz-button (click)="copy(outputTime)"><nz-icon nzType="copy" /></button>
          </nz-col>
        </nz-row>

        <nz-row [nzGutter]="16">
          <nz-col [nzSpan]="10">
            <nz-input-wrapper nzAddonBefore="标准时间">
              <input type="text" nz-input [(ngModel)]="inputTime" placeholder="例如 2026-03-19 12:00:00" />
            </nz-input-wrapper>
          </nz-col>
          <nz-col [nzSpan]="4" style="text-align: center;">
             <button nz-button nzType="primary" (click)="convertTimeToTs()">转换 <nz-icon nzType="arrow-right" /></button>
          </nz-col>
          <nz-col [nzSpan]="8">
            <input nz-input [ngModel]="outputTimestamp" readonly placeholder="时间戳结果" />
          </nz-col>
          <nz-col [nzSpan]="2">
            <button nz-button (click)="copy(outputTimestamp)"><nz-icon nzType="copy" /></button>
          </nz-col>
        </nz-row>
      </nz-tab>

      <!-- JSON Tab -->
      <nz-tab nzTitle="JSON 格式化">
        <nz-row [nzGutter]="16">
          <nz-col [nzSpan]="12">
            <div style="margin-bottom: 8px;">
              <nz-space>
                <button *nzSpaceItem nz-button nzType="primary" (click)="formatJson()">格式化</button>
                <button *nzSpaceItem nz-button (click)="compressJson()">压缩</button>
                <button *nzSpaceItem nz-button nzDanger (click)="jsonInput = ''">清空</button>
              </nz-space>
            </div>
            <textarea nz-input [(ngModel)]="jsonInput" cdkTextareaAutosize [cdkAutosizeMinRows]="15" [cdkAutosizeMaxRows]="25" placeholder="粘贴未格式化的 JSON 字符串..."></textarea>
          </nz-col>
          <nz-col [nzSpan]="12">
             <div style="margin-bottom: 8px;">
               <button nz-button (click)="copy(jsonOutput)"><nz-icon nzType="copy" /> 复制</button>
             </div>
             <textarea nz-input [ngModel]="jsonOutput" readonly cdkTextareaAutosize [cdkAutosizeMinRows]="15" [cdkAutosizeMaxRows]="25" placeholder="输出结果..." style="background-color: var(--bg-tertiary);"></textarea>
          </nz-col>
        </nz-row>
      </nz-tab>

      <!-- Base64 Tab -->
      <nz-tab nzTitle="Base64 编解码">
        <nz-row [nzGutter]="16">
          <nz-col [nzSpan]="24" style="margin-bottom: 16px;">
            <textarea nz-input [(ngModel)]="base64Input" cdkTextareaAutosize [cdkAutosizeMinRows]="5" [cdkAutosizeMaxRows]="10" placeholder="输入需要编解码的内容..."></textarea>
          </nz-col>
          <nz-col [nzSpan]="24" style="text-align: center; margin-bottom: 16px;">
            <nz-space>
              <button *nzSpaceItem nz-button nzType="primary" (click)="encodeBase64()">加密 (Encode)</button>
              <button *nzSpaceItem nz-button (click)="decodeBase64()">解密 (Decode)</button>
            </nz-space>
          </nz-col>
          <nz-col [nzSpan]="24">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">结果 <a (click)="copy(base64Output)" style="margin-left: 8px; font-weight: normal;"><nz-icon nzType="copy"/> 复制</a></label>
            <textarea nz-input [ngModel]="base64Output" readonly cdkTextareaAutosize [cdkAutosizeMinRows]="5" [cdkAutosizeMaxRows]="10" style="background-color: var(--bg-tertiary);"></textarea>
          </nz-col>
        </nz-row>
      </nz-tab>

      <!-- URL Tab -->
      <nz-tab nzTitle="URL 编解码">
         <nz-row [nzGutter]="16">
          <nz-col [nzSpan]="24" style="margin-bottom: 16px;">
            <textarea nz-input [(ngModel)]="urlInput" cdkTextareaAutosize [cdkAutosizeMinRows]="5" [cdkAutosizeMaxRows]="10" placeholder="输入需要编解码的 URL 或参数..."></textarea>
          </nz-col>
          <nz-col [nzSpan]="24" style="text-align: center; margin-bottom: 16px;">
            <nz-space>
              <button *nzSpaceItem nz-button nzType="primary" (click)="encodeUrl()">EncodeURIComponent</button>
              <button *nzSpaceItem nz-button (click)="decodeUrl()">DecodeURIComponent</button>
            </nz-space>
          </nz-col>
          <nz-col [nzSpan]="24">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">结果 <a (click)="copy(urlOutput)" style="margin-left: 8px; font-weight: normal;"><nz-icon nzType="copy"/> 复制</a></label>
            <textarea nz-input [ngModel]="urlOutput" readonly cdkTextareaAutosize [cdkAutosizeMinRows]="5" [cdkAutosizeMaxRows]="10" style="background-color: var(--bg-tertiary);"></textarea>
          </nz-col>
        </nz-row>
      </nz-tab>

    </nz-tabs>
  </nz-card>
</div>
