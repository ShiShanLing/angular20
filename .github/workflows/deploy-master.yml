name: Deploy master to server

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-master
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call server deploy hook
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          DEPLOY_HOOK_SECRET: ${{ secrets.DEPLOY_HOOK_SECRET }}
        run: |
          set -euo pipefail
          response="$(curl -fsS -X POST "http://${SERVER_HOST}/api/deploy/hook" \
            -H "X-Deploy-Token: ${DEPLOY_HOOK_SECRET}" \
            -H "Content-Type: application/json")"
          echo "$response"
          echo "$response" | grep -q '"status":"started"\|"status":"already_running"'
